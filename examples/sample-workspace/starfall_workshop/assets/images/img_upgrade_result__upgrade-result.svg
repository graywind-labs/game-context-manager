<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Upgrade result sample image</title>
  <desc id="desc">A simple sample upgrade panel showing enough stardust and missing parts.</desc>
  <rect width="960" height="540" fill="#fff7ed"/>
  <rect x="76" y="58" width="808" height="424" rx="18" fill="#ffffff" stroke="#ea580c" stroke-width="4"/>
  <text x="120" y="120" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">工坊升级结果示意</text>
  <rect x="130" y="165" width="700" height="90" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
  <text x="160" y="220" font-family="Arial, sans-serif" font-size="26" fill="#155e75">升级预览：任务奖励 +12%</text>
  <rect x="130" y="285" width="320" height="86" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
  <text x="160" y="338" font-family="Arial, sans-serif" font-size="24" fill="#166534">星尘：足够</text>
  <rect x="510" y="285" width="320" height="86" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
  <text x="540" y="338" font-family="Arial, sans-serif" font-size="24" fill="#991b1b">零件：缺少 8</text>
  <rect x="330" y="405" width="300" height="54" rx="12" fill="#7c2d12"/>
  <text x="405" y="440" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">前往零件任务</text>
</svg>
